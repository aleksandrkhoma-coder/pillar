<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons Learned | Pillar</title>
<style>
:root{--bg:#1A2332;--bg2:#223047;--bg3:#2c3d56;--accent:#E85D1A;--blue:#1D6FA4;--green:#1E9E5A;--red:#D93025;--yellow:#F39C12;--purple:#9B59B6;--teal:#1ABC9C;--text:#E8EDF5;--text2:#9aafc8;--border:#2e4060;--card:#1e2d42;--tag-bg:#243450}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:14px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px}
.header-stats{margin-left:auto;display:flex;gap:24px}
.stat{text-align:center}.stat-val{font-size:20px;font-weight:700;color:var(--accent)}.stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.gen-time{font-size:11px;color:var(--text2);margin-left:20px;white-space:nowrap}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;background:rgba(29,111,164,.18);border:1px solid rgba(29,111,164,.45);border-radius:20px;color:#5BB3E0;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;transition:all .15s;flex-shrink:0;margin-left:16px}
.back-btn:hover{background:rgba(29,111,164,.35)}
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:14px 28px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5;pointer-events:none}
.search-inp{width:100%;padding:8px 30px 8px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:2px 4px;line-height:1;transition:color .15s;border-radius:3px}
.search-x:hover{color:var(--text)}
.search-inp:focus{border-color:var(--blue)}.search-inp::placeholder{color:var(--text2)}
select.filter{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;cursor:pointer;outline:none;min-width:130px}
select.filter:focus{border-color:var(--blue)}
.btn-clear{background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px;transition:all .15s}
.btn-clear:hover{border-color:var(--accent);color:var(--accent)}
.results-count{font-size:12px;color:var(--text2);white-space:nowrap;margin-left:auto}
.main{padding:20px 28px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px 14px;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.card:hover{border-color:var(--blue);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card[data-cat="Ризики"]::before{background:var(--red)}
.card[data-cat="Комунікація"]::before{background:var(--blue)}
.card[data-cat="Планування"]::before{background:var(--accent)}
.card[data-cat="Команда"]::before{background:var(--purple)}
.card[data-cat="Стейкхолдери"]::before{background:var(--yellow)}
.card[data-cat="Технічне"]::before{background:var(--teal)}
.card[data-cat="Бюджет"]::before{background:var(--green)}
.card[data-cat="Закупівлі"]::before{background:#E67E22}
.card[data-cat="Якість"]::before{background:#3498DB}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.card-id{font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.4px}
.badge-cat{background:rgba(29,111,164,.25);color:#5BB3E0}
.badge-phase{background:rgba(30,158,90,.2);color:#4DC98A}
.badge-proj{background:rgba(232,93,26,.2);color:#F5956A}
.badge-date{color:var(--text2);font-size:11px;padding:3px 0}
.card-sections{display:flex;flex-direction:column;gap:10px}
.card-section label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);display:block;margin-bottom:3px}
.card-section p{font-size:13px;line-height:1.55;color:var(--text)}
.card-rec p{color:#7FD6A0}
.card-footer{display:flex;align-items:center;gap:6px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11px;background:var(--tag-bg);color:var(--text2);padding:2px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.tag:hover{background:var(--blue);color:#fff}
.author{margin-left:auto;font-size:11px;color:var(--text2)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
mark{background:rgba(232,93,26,.35);color:inherit;border-radius:2px;padding:0 1px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="header">
  <div class="logo">PILLAR <span>Lessons Learned</span></div>
  <div class="header-stats">

</div>
<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

</div>
<div class="main">

  <div class="empty hidden" id="emptyState">

  </div>
</div>
<script>
const ALL_DATA=[{"ID": "1", "Дата": "15.05.2026", "Проєкт": "7002", "Категорія": "Комунікація", "Фаза": "Виконання", "Ситуація": "Підрядник не повідомив про затримку поставки за 2 тижні до дедлайну. Дізнались лише коли термін вже минув.", "Висновок": "Відсутність регулярних статус-апдейтів від підрядника призводить до пізнього виявлення проблем.", "Рекомендація": "Вимагати від підрядників письмовий статус-звіт щотижня. Додати пункт до договору.", "Теги": "#підрядники #комунікація #звітність", "Автор": "Хома"}, {"ID": "2", "Дата": "20.04.2026", "Проєкт": "8008", "Категорія": "Ризики", "Фаза": "Планування", "Ситуація": "Ризик затримки дозвільної документації не був включений до реєстру ризиків на етапі планування.", "Висновок": "Регуляторні ризики недооцінюються на старті проєкту, що призводить до графікових зривів.", "Рекомендація": "Включати в чекліст ініціації обов'язковий аналіз регуляторних вимог. Консультуватись з юристом на старті.", "Теги": "#ризики #дозволи #регулятори", "Автор": "Донська"}, {"ID": "3", "Дата": "10.03.2026", "Проєкт": "5870", "Категорія": "Команда", "Фаза": "Виконання", "Ситуація": "Ключовий спеціаліст пішов у відпустку під час критичної фази без передачі справ.", "Висновок": "Відсутність плану наступності для критичних ролей збільшує ризик зупинки проєкту.", "Рекомендація": "Для кожної критичної ролі призначати заступника. Обов'язкова передача справ за 5 днів до відпустки.", "Теги": "#команда #ризики #наступність", "Автор": "Александров"}, {"ID": "4", "Дата": "11.06.2026", "Проєкт": "7474", "Категорія": "Комунікація", "Фаза": "Виконання", "Ситуація": "Конструктор чекає на відповіді від прораба для створення креслень замість прямого дзвінка. Комунікація через посередника сповільнює процес.", "Висновок": "Затримка у монтажі та простой. Відсутність прямого зв'язку між конструктором і монтажниками збільшує час очікування.", "Рекомендація": "Вимагати від конструкторів безпосередньої комунікації телефоном з монтажниками та прорабом під час монтажу.", "Теги": "#комунікація #взаємодія #затримка", "Автор": "Іщук І."}, {"ID": "5", "Дата": "07.06.2026", "Проєкт": "8070", "Категорія": "Інше", "Фаза": "Виконання", "Ситуація": "Конструктор збільшив розмір профілю для монтажу PV, але гайки (квадратні) для кріплення PV залишив без змін. В результаті розміру гайки недостатньо для монтажу на збільшений профіль — гайка провалюється.", "Висновок": "Замовник не зможе зібрати карпорт (встановити панелі). Невідповідність кріпильних елементів блокує завершення монтажу.", "Рекомендація": "Вимагати від конструкторів закладати в конструкцію відповідні кріпильні елементи при будь-якій зміні конструктивних профілів.", "Теги": "#конструктор #ризики #зміни", "Автор": "Іщук І."}, {"ID": "6", "Дата": "06.2026", "Проєкт": "5870, 6704", "Категорія": "Технічне", "Фаза": "Моніторинг", "Ситуація": "Під час отримання матеріалів на майданчику було вино ряд помилок конструкторського відділу - прошу взяти до уваги та не повторювати у майбутньому:\n- відсутність метизної групи для з'єднання стойок та ростверку\n- часткова відсутність отворів на елементах VBr-1\n- під час монтажу виявилося що болти 250 мм DIN 931 (не повна різьба, була погоджена у цій групі) не підходять (різьба виявилася замалою).\n- алюмінієві водозбірні профілі просять зробити так щоб вони були в рівень з панелями, а не менше на 150мм (буде виглядати більш естетично) (так само і для 5870)\n- під час монтажу виявилося що болти М12 DIN933 не підходять для кріплення елементів Rl-1 та Rl-2 (отвори передбачені для М8)", "Висновок": "Збільшення вартості проєкту так як для безперебіного монтажу купляли метизи на місці.", "Рекомендація": "Перевірити комплет КМД та Специфікацію на відповідність", "Теги": "#проєктування #перевірка #Монтаж", "Автор": "Александров"}, {"ID": "7", "Дата": "06.2026", "Проєкт": "6842", "Категорія": "Закупівлі", "Фаза": "Виконання", "Ситуація": "Відсутність у постачальників прижимів що задовільняють нашим вимогам, а саме:\n- Товщина\n- Геометрія \n- Покриття", "Висновок": "Збільшення строків постачлання, збільшення вартості закупівлі, зміна матеріалу покриття (додаткове погодження з замовником - підтвердження ще не отримано)", "Рекомендація": "Закупити запас прижимів на склад для постіної наявності неодхідних позицій", "Теги": "#постачання #склад #ціна", "Автор": "Александров"}, {"ID": "8", "Дата": "06.2026", "Проєкт": "8438", "Категорія": "Закупівлі", "Фаза": "Виконання", "Ситуація": "Під проєкт було виконана гальванізація ГШ, готовність була на Середу 2026_06_10, але у зв'язку з тим що не було оплачено 700 грн (затримка 7 днів) перевізнику він відмовився перевезти нам необхідний матеріал на наш склад для перевірки та комплектування. У в'язку з чим нам довелеося виконувати перевезення влісним навантажувачем та виводити людей на роботу в суботу.", "Висновок": "Збільшення вартості виконання робіт, та термінів постачання ГШ що негативно впливає на імідж.", "Рекомендація": "Виділити ПМ бо керівнику відділу постачання підзвітних грошей у розміри 10 000,00 грн. для закриття таких ситуації оперативно", "Теги": "#постачання #склад #ціна", "Автор": "Александров"}, {"ID": "9", "Дата": "29.05.2026", "Проєкт": "7084", "Категорія": "Технічне", "Фаза": "Виконання", "Ситуація": "1.У рішенні заклали отвори у \"закладних\" діаметром 17мм. під гвинт М16. За рахунок погрішності при виконнані цих отворів та налипання цинку, гвинти не заходили. 2. Недопрацьований конструкторами вузол кріплення укосин між колонами та продольними/поперечними балками. 3. На етапі виробництва перейшли на інше січення профілів під ФЕМ (складська позиція), конструктора упустили момент збільшити закладені 40мм. метизи під прижими панелей. 4. Помилки у проектуванні - невірно заклали розташування отворів на колонах під кріплення одніє номенклатури \"укосини\" 5. Помилки відділу закупівлі при заміні - замовили 2а рази не той DIN, замість 913 - доставили 933. 6. Неналежна прийомка/передача матеріалів підряднику/ом. - недоїхало по 5ть прижимів Z/T/пластин. 6. Неналежний контроль ПМ відвантаження двох номенклатур підряднику під першу чергу реалізації проекту (бетонування фундаменту)", "Висновок": "Виникнення додаткових робіт по свердлінню кожної закладної (36шт х 4отв.) та оворів на колонах 36шт. Додаткові логістичні витрати на доукомплектацію/заміну.", "Рекомендація": "Збільшити отвори на +2мм. до закладеного діаметру гвинта. Обов'язкова перевірка головним конструктором усього проекту перед запуском у виробництво та контрольна збірка одного прольоту. Додавати запас на метизну частину по довжині, як мінімум +5мм. Запровадити більш ретельний контроль відвантажень по номенклатурах.", "Теги": "#комунікація #рішення #закупівля #звіт", "Автор": "Заянчковський О."}, {"ID": "10", "Дата": "15.06.2026", "Проєкт": "3456", "Категорія": "Ризики", "Фаза": "Виконання", "Ситуація": "1. встановлено невідповідність фактичних умов даним, наведеним у генеральному плані, ділянка пронизана інженерними комунікаціями та залишками фундаментів, що не дає можливості вкрутити геошурупи. 2. Монтажна бригада не має дозвільних документів на роботу авантом. 3. Перед підписанням договору було проведено випробування, підтверджено монтажним відділом можливіть вкручування. По факту- не можливо.", "Висновок": "Зрив виконання робіт, перевищення бюджету, зміщення всього графіку проєкту, зниження довіри, штрафи, Можливі претензії/спори з клієнтом", "Рекомендація": "1. Проводити георадарне обстеження (GPR) паралельно з проведенням випробувань. 2. Впровадити чек-лист допуску до робіт з призначенням відповідальної особи. 3. Впровадити для монтажних бригад \"Звіт про результати проведених робіт\"", "Теги": "#інженерні комунікації, #ризики, #монтаж", "Автор": "Донська"}];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escRe(s){return s.replace(/[.*+?^${}()|[\]]/g,'\\$&')}
function hl(t,q){const s=esc(t);if(!q)return s;return s.replace(new RegExp('('+escRe(esc(q))+')','gi'),'<mark>$1</mark>')}
function pop(id,vals,ph){const sel=document.getElementById(id);sel.innerHTML=`<option value="">${ph}</option>`;vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o)})}
function render(data,q){
  const grid=document.getElementById('cardsGrid'),empty=document.getElementById('emptyState');
  document.getElementById('resultsCount').textContent=`Показано: ${data.length} із ${ALL_DATA.length}`;
  if(!data.length){grid.innerHTML='';empty.classList.remove('hidden');return}
  empty.classList.add('hidden');
  grid.innerHTML=data.map(r=>{
    const tags=String(r['Теги']||'').split(/\s+/).filter(t=>t.startsWith('#'));
    return `<div class="card" data-cat="${esc(r['Категорія'])}">
      <div class="card-header"><span class="card-id">#${esc(r['ID'])}</span></div>
      <div class="card-meta">
        ${r['Категорія']?`<span class="badge badge-cat">${esc(r['Категорія'])}</span>`:''}
        ${r['Фаза']?`<span class="badge badge-phase">${esc(r['Фаза'])}</span>`:''}
        ${r['Проєкт']?`<span class="badge badge-proj">Проєкт ${esc(r['Проєкт'])}</span>`:''}
        ${r['Дата']?`<span class="badge badge-date">${esc(r['Дата'])}</span>`:''}
      </div>
      <div class="card-sections">
        <div class="card-section"><label>Ситуація</label><p>${hl(r['Ситуація'],q)}</p></div>
        <div class="card-section"><label>Висновок</label><p>${hl(r['Висновок'],q)}</p></div>
        <div class="card-section card-rec"><label>✅ Рекомендація</label><p>${hl(r['Рекомендація'],q)}</p></div>
      </div>
      <div class="card-footer">
        ${tags.map(t=>`<span class="tag" onclick="ftag('${esc(t)}')">${esc(t)}</span>`).join('')}
        ${r['Автор']?`<span class="author">👤 ${esc(r['Автор'])}</span>`:''}
      </div>
    </div>`;
  }).join('');
}
function doFilter(){
  const q=document.getElementById('searchInp').value.toLowerCase().trim();
  const cat=document.getElementById('filterCat').value;
  const phase=document.getElementById('filterPhase').value;
  const proj=document.getElementById('filterProject').value;
  render(ALL_DATA.filter(r=>{
    if(cat&&r['Категорія']!==cat)return false;
    if(phase&&r['Фаза']!==phase)return false;
    if(proj&&r['Проєкт']!==proj)return false;
    if(q){const h=[r['Ситуація'],r['Висновок'],r['Рекомендація'],r['Теги'],r['Проєкт'],r['Автор']].join(' ').toLowerCase();return h.includes(q)}
    return true;
  }),q);
}
function ftag(t){document.getElementById('searchInp').value=t;doFilter()}
const cats=[...new Set(ALL_DATA.map(r=>r['Категорія']).filter(Boolean))].sort();
const phases=[...new Set(ALL_DATA.map(r=>r['Фаза']).filter(Boolean))].sort();
const projs=[...new Set(ALL_DATA.map(r=>r['Проєкт']).filter(Boolean))].sort();
pop('filterCat',cats,'Всі категорії');
pop('filterPhase',phases,'Всі фази');
pop('filterProject',projs,'Всі проєкти');
document.getElementById('statTotal').textContent=ALL_DATA.length;
document.getElementById('statProjects').textContent=projs.length;
document.getElementById('statCats').textContent=cats.length;
const searchInp=document.getElementById('searchInp'),searchX=document.getElementById('searchX');
searchInp.addEventListener('input',()=>{
  searchX.classList.toggle('hidden',!searchInp.value);
  doFilter();
});
searchX.addEventListener('click',()=>{searchInp.value='';searchX.classList.add('hidden');doFilter();searchInp.focus()});
['filterCat','filterPhase','filterProject'].forEach(id=>document.getElementById(id).addEventListener('change',doFilter));
document.getElementById('btnClear').addEventListener('click',()=>{
  searchInp.value='';searchX.classList.add('hidden');
  ['filterCat','filterPhase','filterProject'].forEach(id=>document.getElementById(id).value='');
  doFilter();
});
render(ALL_DATA,'');
</script>
</body>
</html>
